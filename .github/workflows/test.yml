name: test

# Minimal CI: syntax-check + the hermetic vitest suite (no LaTeX needed — tests
# assert generated .tex/.md strings, not compiled PDFs). Broader integration
# (PDF compile, real-lecture regen) lands with a future RC.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      # `npm install`, not `npm ci`: the committed lock is authored by npm 11
      # (local), while node 22 here ships npm 10, which rejects the lockfile-v3
      # tree. install is lenient to that skew. Tighten to `npm ci` once the lock
      # + npm versions are pinned at RC time.
      - run: npm install --no-audit --no-fund --no-progress
      - run: npm run check
      - run: npm test
